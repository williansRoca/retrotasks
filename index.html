<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RetroTasks</title>
  <meta name="description" content="Tu gestor de tareas, notas y recordatorios con estilo retro moderno." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#FFD24A" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="RetroTasks" />

  <!-- Capacitor: se inyecta automáticamente en Android -->
  <!-- El script capacitor.js solo existe en el contexto de Android/iOS -->

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- La interfaz completa se construye dinámicamente desde app.js -->
  <!-- Dependiendo del estado de Auth, muestra la pantalla de login o la app principal -->
  <div id="app" class="pt-app" aria-live="polite"></div>

  <!-- Módulo principal (carga auth, theme y el resto de la app) -->
  <script type="module" src="./js/app.js" id="app-module"></script>

  <!-- Fallback: si el módulo principal no puede cargarse (p. ej. primera
       visita sin conexión, antes de que exista caché), mostramos un
       mensaje con opción de reintentar en vez de una pantalla en blanco. -->
  <script>
    document.getElementById("app-module").addEventListener("error", () => {
      const app = document.getElementById("app");
      if (!app || app.children.length > 0) return;
      app.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px;text-align:center;font-family:sans-serif;color:#3A2E22;">' +
        '<div style="font-size:40px;">📡</div>' +
        '<h1 style="font-size:18px;margin:0;">SIN CONEXIÓN</h1>' +
        '<p style="font-size:14px;margin:0;max-width:280px;">No se pudo cargar RetroTasks. Revisa tu conexión a internet e inténtalo de nuevo.</p>' +
        '<button onclick="location.reload()" style="font-size:15px;font-weight:800;padding:12px 24px;background:#FFD24A;color:#3A2E22;border:3px solid #4A3826;box-shadow:3px 3px 0 #7A5230;cursor:pointer;">⟳ REINTENTAR</button>' +
        '</div>';
    });
  </script>

  <!-- Manejo de Service Worker (desactivado en Android nativo, activo en Web) -->
  <script>
    // En Android/iOS nativo, los archivos ya están integrados en la app, 
    // no se necesita Service Worker para el offline y puede causar problemas de caché.
    const isNative = (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) || 
                     (navigator.userAgent.includes("Android") && window.location.href.startsWith("http://localhost"));

    if (isNative) {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function() {
              console.log("Service Worker nativo desinstalado con éxito para evitar problemas de caché.");
            });
          }
        });
      }
    } else {
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js")
            .catch((err) => console.warn("SW no registrado:", err));
        });
      }
    }
  </script>
</body>
</html>
